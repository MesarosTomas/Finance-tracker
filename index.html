<style>
:root{
  --bg:#070c18;--surface:#0a0f1f;--card:#0d1526;--border:#1a2540;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;--text4:#334155;
  --inp:#131f35;--inp-b:#253556;--hover:#0a1220;--alt:#080e18;
  --shadow:rgba(0,0,0,.4);
}
body.light{
  --bg:#f0f4f8;--surface:#ffffff;--card:#ffffff;--border:#dde3ec;
  --text:#1a202c;--text2:#4a5568;--text3:#718096;--text4:#a0aec0;
  --inp:#f7fafc;--inp-b:#cbd5e0;--hover:#edf2f7;--alt:#f7fafc;
  --shadow:rgba(0,0,0,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--inp-b);border-radius:2px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;transition:background .3s,border-color .3s}
.inp{background:var(--inp);border:1px solid var(--inp-b);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;width:100%;outline:none;font-family:inherit;transition:border-color .2s,background .3s}
.inp:focus{border-color:#10b981}
.inp option{background:var(--card)}
.inp-sm{background:var(--inp);border:1px solid var(--inp-b);border-radius:6px;padding:3px 7px;color:var(--text);font-size:12px;outline:none;font-family:'Courier New',monospace;width:75px;text-align:right;transition:border-color .2s}
.inp-sm:focus{border-color:#10b981}
.btn{background:#10b981;color:#002b1a;border:none;border-radius:8px;padding:10px 20px;font-weight:700;cursor:pointer;font-size:14px;font-family:inherit;transition:all .15s}
.btn:hover{background:#0d9b6e}
.btn-g{background:var(--inp);color:var(--text2);border:1px solid var(--inp-b);border-radius:8px;padding:10px 16px;cursor:pointer;font-size:14px;font-family:inherit;transition:all .15s}
.btn-g:hover{background:var(--hover)}
.btn-sm{background:var(--inp);color:var(--text3);border:1px solid var(--border);border-radius:6px;padding:3px 10px;cursor:pointer;font-size:12px;font-family:inherit}
.btn-sm:hover{background:var(--hover)}
.tab{padding:7px 13px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;font-family:inherit;white-space:nowrap}
.tab.on{background:#10b981;color:#001a0d}
.tab:not(.on){background:transparent;color:var(--text3)}
.tab:not(.on):hover{color:var(--text2);background:var(--inp)}
.mono{font-family:'Courier New',monospace}
.txrow{border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:flex-start;gap:10px;transition:background .12s}
.txrow:last-child{border-bottom:none}
.txrow:hover{background:var(--hover)}
.bdg{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.ov{position:fixed;inset:0;background:rgba(0,5,15,.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
body.light .ov{background:rgba(0,0,0,.5)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:26px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.pbar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .5s}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:#10b981;color:#001a0d;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 24px rgba(16,185,129,.45);display:flex;align-items:center;justify-content:center;z-index:50;transition:all .2s}
.fab:hover{background:#0d9b6e;transform:scale(1.06)}
.ibtn{background:none;border:none;cursor:pointer;padding:5px;border-radius:6px;font-size:14px;line-height:1;transition:background .15s;color:var(--text2)}
.ibtn:hover{background:var(--border)}
.stit{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.tbtn{flex:1;padding:9px 4px;border-radius:8px;border:1px solid var(--inp-b);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
.drow{border-bottom:1px solid var(--border);transition:background .1s}
.drow:hover{background:var(--hover) !important}
.notif{padding:10px 14px;border-radius:10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px}
.tag{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--inp);color:var(--text2);cursor:pointer;border:1px solid var(--inp-b)}
.tag:hover{border-color:#10b981;color:#10b981}
.tag.sel{background:#10b98122;color:#10b981;border-color:#10b981}

/* PRINT / PDF */
@media print{
  body{background:#fff !important;color:#000 !important;font-family:Arial,sans-serif !important}
  .fab,.tab-bar,.header-bar,.no-print{display:none !important}
  .print-only{display:block !important}
  .card{border:1px solid #ddd !important;background:#fff !important;border-radius:8px;margin-bottom:12px;break-inside:avoid}
  .print-page{padding:20px}
  .print-title{font-size:22px;font-weight:800;color:#10b981;margin-bottom:4px}
  .print-sub{font-size:13px;color:#666;margin-bottom:20px}
  .print-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .print-kpi{background:#f8fffe;border:1px solid #10b98133;border-radius:8px;padding:12px;text-align:center}
  .print-kpi .lbl{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px}
  .print-kpi .val{font-size:18px;font-weight:800;color:#10b981;font-family:monospace;margin-top:4px}
  .print-kpi .val.red{color:#ef4444}
  .print-kpi .val.gold{color:#f59e0b}
  .print-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px}
  .print-table th{background:#f0fdf9;color:#065f46;padding:8px 10px;text-align:left;font-size:10px;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid #10b981}
  .print-table td{padding:7px 10px;border-bottom:1px solid #eee}
  .print-table tr:nth-child(even) td{background:#f9fffe}
  .print-table td.num{text-align:right;font-family:monospace;font-weight:600}
  .print-table td.pos{color:#059669;font-family:monospace;text-align:right;font-weight:700}
  .print-table td.neg{color:#dc2626;font-family:monospace;text-align:right;font-weight:700}
  .print-section-title{font-size:14px;font-weight:800;color:#1a202c;margin:16px 0 8px;padding-bottom:4px;border-bottom:2px solid #10b981}
  .print-bar-wrap{margin-bottom:16px}
  .print-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px}
  .print-bar-label{min-width:140px;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .print-bar-track{flex:1;height:12px;background:#eee;border-radius:6px;overflow:hidden}
  .print-bar-fill{height:100%;border-radius:6px}
  .print-bar-val{min-width:80px;text-align:right;font-family:monospace;font-weight:600;font-size:11px}
  .print-footer{margin-top:20px;padding-top:10px;border-top:1px solid #eee;font-size:10px;color:#999;text-align:center}
}
.print-only{display:none}
</style>

<script type="text/babel">

const EXP_CATS=["Hypotéka","MBA - škola","Investovanie","Tankovanie","Potraviny nákup","Auto","Poistenie","Darčeky","Reštaurácia + káva","Sporenie","Transport - taxi","Bary - alkohol","Baby fond","Telefón","Predplatné (TV…)","Osobná starostlivosť","Oblečenie","Bolt food","Voľnočasové aktivity","Domácnosť","Pracovné obedy","Energie byt","Nezaradené"];

const SUPABASE_URL = 'https://aqkagjpaxpmmbdlkxufn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxa2FnanBheHBtbWJkbGt4dWZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NjQxMDUsImV4cCI6MjA5NDE0MDEwNX0.vVoXt9NAig_fK55COCy24U0-1rWvmyDvMk-G6WnA7Og';

// Map tx object → DB row (camelCase → snake_case)
const txToRow = tx => ({
  id: tx.id,
  date: tx.date||'',
  description: tx.desc||tx.description||'',
  cat: tx.cat||tx.category||'',
  type: tx.type||'Výdavok',
  amount: parseFloat(tx.amount)||0,

  recurring_day: tx.recurringDay||tx.recurring_day||null,
  month: tx.month||1,
  year: tx.year||new Date().getFullYear(),
});
// Map DB row → tx object (snake_case → camelCase)
const rowToTx = r => ({
  ...r,
  desc: r.description,
  cat: r.cat,
  dir: r.dir,
  accountId: r.account_id,
  accountName: r.account_name,
  recurringDay: r.recurring_day,
});

const db = {
  async loadAll() {
    try {
      const [txRes, dataRes] = await Promise.all([
        _supa.from('transactions').select('*').order('date', {ascending:false}),
        _supa.from('app_data').select('*')
      ]);
      const txs = (txRes.data||[]).map(rowToTx);
      const appData = {};
      (dataRes.data||[]).forEach(r => { appData[r.key] = r.value; });
      return {txs, appData};
    } catch(e) {
      console.warn('Supabase load failed, using localStorage:', e);
      return null;
    }
  },
  async setTxs(newTxs, oldTxs) {
    const oldIds = new Set((oldTxs||[]).map(t=>t.id));
    const newIds = new Set(newTxs.map(t=>t.id));
    const toDelete = [...oldIds].filter(id=>!newIds.has(id));
    if(toDelete.length>0){
      const {error:delErr} = await _supa.from('transactions').delete().in('id', toDelete);
      if(delErr) throw delErr;
    }
    if(newTxs.length>0){
      const rows = newTxs.map(txToRow);
      const {error:upsErr} = await _supa.from('transactions').upsert(rows);
      if(upsErr) throw upsErr;
    }
    ls.set('fin_txs', newTxs);
  },
  async setAppData(key, value) {
    const {error} = await _supa.from('app_data').upsert({key, value, updated_at: new Date().toISOString()});
    if(error) throw error;
    ls.set(key, value);
  }
};
const fmt=(n)=>Math.abs(n).toLocaleString("sk-SK",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
const isInc=(tx)=>tx.type==="Príjem"||(tx.type==="Prevod"&&(tx.dir||tx.direction)==="in");

// ── MONEY INPUT ───────────────────────────────────────────────────────────
function MoneyInput({value,onSave,placeholder,style,className}){
  const [v,setV]=useState(value===0||value===""?"":String(value));
  const prev=useRef(value);
  useEffect(()=>{if(value!==prev.current){setV(value===0||value===""?"":String(value));prev.current=value;}},[value]);
  const handleChange=e=>{const raw=e.target.value.replace(",",".");if(/^(\d*\.?\d{0,2})?$/.test(raw))setV(raw);};
  const handleBlur=()=>{const n=parseFloat(v)||0;onSave(n);prev.current=n;};
  return <input className={className||"inp-sm"} type="text" inputMode="decimal" placeholder={placeholder||"0.00"} value={v} onChange={handleChange} onBlur={handleBlur} style={style}/>;
}

// ── TAGS INPUT ────────────────────────────────────────────────────────────
function TagsInput({tags,onChange}){
  const [input,setInput]=useState("");
  const add=()=>{const t=input.trim().replace(/^#*/,"");if(t&&!tags.includes(t)){onChange([...tags,t]);}setInput("");};
  const remove=t=>onChange(tags.filter(x=>x!==t));
  return(
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}>
        {tags.map(t=><span key={t} className="tag sel" onClick={()=>remove(t)}>#{t} ×</span>)}
      </div>
      <div style={{display:"flex",gap:6}}>
        <input className="inp" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"||e.key===","){e.preventDefault();add();}}} placeholder="Pridaj tag (napr. dovolenka)..." style={{fontSize:13}}/>
        <button className="btn-sm" onClick={add} style={{whiteSpace:"nowrap"}}>+ Tag</button>
      </div>
    </div>
  );
}

// ── PDF EXPORT ────────────────────────────────────────────────────────────
function exportPDF({month,year,txs,budgets,catSpend,income,expenses,savings,goals,oaData,customCats,allExpCats}){
  const mTxs=txs.filter(tx=>tx.month===month&&tx.year===year);
  const mName=MONTHS[month-1];
  const savRate=income>0?((savings/income)*100).toFixed(1):"0";
  const oaKey=`${year}-${month}`;
  const oaMd=oaData[oaKey]||{dailyRate:7.28,days:{}};
  const dim=new Date(year,month,0).getDate();
  const getDOW=d=>new Date(year,month-1,d).getDay();
  const isWknd=d=>{const dw=getDOW(d);return dw===0||dw===6;};
  const oaRows=Array.from({length:dim},(_,i)=>i+1).map(d=>{
    const dd=oaMd.days[String(d)]||{dayOff:isWknd(d),spent:0};
    const wknd=isWknd(d);const dayOff=dd.dayOff??wknd;
    const narok=dayOff?0:oaMd.dailyRate;const spent=parseFloat(dd.spent)||0;
    return{d,dayOff,wknd,narok,spent,rozdiel:narok-spent};
  });
  const oaTotN=oaRows.reduce((s,r)=>s+r.narok,0);
  const oaTotS=oaRows.reduce((s,r)=>s+r.spent,0);
  const topCats=Object.entries(catSpend).sort(([,a],[,b])=>b-a).slice(0,10);
  const totalBudget=Object.values(budgets).reduce((s,v)=>s+v,0);

  // Build bar chart SVG for categories
  const maxCat=Math.max(...topCats.map(([,v])=>v),1);
  const barW=420,barH=20,barGap=6;
  const barsHtml=topCats.map(([name,val],i)=>{
    const limit=budgets[name]||0;
    const pct=Math.min(100,(val/maxCat)*100);
    const over=limit>0&&val>limit;
    const fill=over?"#ef4444":val/maxCat>0.8?"#f59e0b":PCOLS[i%PCOLS.length];
    return `<div class="print-bar-row">
      <div class="print-bar-label">${name}</div>
      <div class="print-bar-track"><div class="print-bar-fill" style="width:${pct}%;background:${fill}"></div></div>
      <div class="print-bar-val" style="color:${fill}">${fmt(val)}</div>
    </div>`;
  }).join("");

  const txRows=mTxs.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(tx=>{
    const inc=isInc(tx);
    const desc=(tx.desc||tx.description||"").substring(0,40);
    const cat=tx.cat||tx.category||"";
    const tagsStr=(tx.tags||[]).map(t=>`#${t}`).join(" ");
    const acct=tx.accountName||"";
    return `<tr>
      <td>${tx.date}</td><td>${desc}${tagsStr?`<br><span style="font-size:10px;color:#10b981">${tagsStr}</span>`:""}</td>
      <td>${cat}</td><td>${acct}</td>
      <td class="${inc?"pos":"neg"}">${inc?"+":"−"}${tx.amount.toFixed(2)} €</td>
    </tr>`;
  }).join("");

  const goalRows=goals.map(g=>{
    const pct=g.target>0?((g.current/g.target)*100).toFixed(1):0;
    const fill=parseFloat(pct)>=100?"#10b981":parseFloat(pct)>50?"#f59e0b":"#3b82f6";
    return `<tr>
      <td>${g.icon} ${g.name}</td>
      <td class="num">${fmt(g.target)}</td>
      <td class="num" style="color:#10b981;font-weight:700">${fmt(g.current)}</td>
      <td class="num">${fmt(Math.max(0,g.target-g.current))}</td>
      <td class="num" style="color:${fill};font-weight:700">${pct} %</td>
    </tr>`;
  }).join("");

  const w=window.open("","_blank");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>FinanceTracker — ${mName} ${year}</title>
  <style>
  body{font-family:Arial,sans-serif;background:#fff;color:#000;padding:28px;font-size:13px}
  .print-title{font-size:24px;font-weight:800;color:#10b981;margin-bottom:2px}
  .print-sub{font-size:12px;color:#666;margin-bottom:22px}
  .print-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
  .print-kpi{background:#f8fffe;border:1px solid #10b98133;border-radius:8px;padding:12px;text-align:center}
  .print-kpi .lbl{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.5px}
  .print-kpi .val{font-size:18px;font-weight:800;font-family:monospace;margin-top:4px}
  .print-section-title{font-size:14px;font-weight:800;color:#065f46;margin:18px 0 8px;padding-bottom:5px;border-bottom:2px solid #10b981}
  .print-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:11px}
  .print-bar-label{min-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#333}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────
function getNotifs(catSpend,budgets,income,expenses,savings,prevMonthExpenses){
  const notifs=[];
  Object.entries(catSpend).forEach(([cat,val])=>{
    const lim=budgets[cat]||0;
    if(lim>0&&val>lim) notifs.push({type:"error",msg:`🔴 ${cat}: Prekročený limit o ${fmt(val-lim)}`});
    else if(lim>0&&val/lim>0.8) notifs.push({type:"warn",msg:`🟡 ${cat}: Na ${((val/lim)*100).toFixed(0)}% rozpočtu`});
  });
  if(savings<0) notifs.push({type:"error",msg:`🔴 Mínus mesiac! Výdavky prevyšujú príjem o ${fmt(Math.abs(savings))}`});
  else if(income>0&&savings/income<0.1) notifs.push({type:"warn",msg:`🟡 Miera úspory len ${((savings/income)*100).toFixed(1)}% — cieľ je min 20%`});
  if(prevMonthExpenses>0&&expenses>prevMonthExpenses*1.2) notifs.push({type:"warn",msg:`🟡 Výdavky sú o ${(((expenses-prevMonthExpenses)/prevMonthExpenses)*100).toFixed(0)}% vyššie ako minulý mesiac`});
  return notifs;
}

function SimplePie({data}){
  if(!data||data.length===0) return <div style={{color:"var(--text3)",textAlign:"center",padding:"56px 0",fontSize:13}}>Žiadne dáta</div>;
  const total=data.reduce((s,d)=>s+d.value,0);
  let angle=0;
  const paths=data.map((d,i)=>{
    const a=(d.value/total)*360,start=angle;angle+=a;
    const toRad=deg=>deg*Math.PI/180,r=75,cx=95,cy=95;
    const x1=cx+r*Math.sin(toRad(start)),y1=cy-r*Math.cos(toRad(start));
    const x2=cx+r*Math.sin(toRad(start+a)),y2=cy-r*Math.cos(toRad(start+a));
    return <path key={i} d={`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${a>180?1:0},1 ${x2},${y2} Z`} fill={PCOLS[i%PCOLS.length]} opacity={.9}/>;
  });
  return <svg viewBox="0 0 190 190" style={{width:"100%",maxHeight:180}}>{paths}<circle cx={95} cy={95} r={46} fill="var(--card)"/></svg>;
}

// ── OBEDY TAB ─────────────────────────────────────────────────────────────
function ObedyTab({month,year,oaData,saveOa}){
  const key=`${year}-${month}`;
  const md=oaData[key]||{dailyRate:7.28,days:{},wInv:{}};
  const [editRate,setEditRate]=useState(false);
  const [rateVal,setRateVal]=useState(String(md.dailyRate));
  useEffect(()=>setRateVal(String((oaData[key]||{dailyRate:7.28}).dailyRate)),[key,JSON.stringify(oaData[key])]);

  const dim=new Date(year,month,0).getDate();
  const getDOW=d=>new Date(year,month-1,d).getDay();
  const isWknd=d=>{const dw=getDOW(d);return dw===0||dw===6;};
  const getDayData=d=>{const s=md.days[String(d)];if(s)return s;return{dayOff:isWknd(d),spent:0};};

  const updateDay=useCallback((d,patch)=>{
    const prev=getDayData(d);
    saveOa({...oaData,[key]:{...md,days:{...md.days,[String(d)]:{...prev,...patch}}}});
  },[oaData,key,md]);

  const saveRate=()=>{const r=parseFloat(rateVal)||7.28;saveOa({...oaData,[key]:{...md,dailyRate:r}});setEditRate(false);};

  const getWInv=wi=>parseFloat(((md.wInv||{})[String(wi)])||0)||0;
  const setWInv=(wi,val)=>{
    saveOa({...oaData,[key]:{...md,wInv:{...(md.wInv||{}),[String(wi)]:val}}});
  };

  // Build rows
  // KEY LOGIC: hasEntry = user explicitly typed something in "Zaplatené" field
  //            (flag spentEntered:true is set only when DayCell saves)
  //            Empty field → rozdiel = null → shows "—" and is NOT counted in totals
  const rows=Array.from({length:dim},(_,i)=>i+1).map(d=>{
    const dd=getDayData(d);
    const wknd=isWknd(d);
    const dayOff=dd.dayOff??wknd;
    const narok=dayOff?0:md.dailyRate;
    const spent=parseFloat(dd.spent)||0;
    const hasEntry=!wknd&&!dayOff&&(md.days[String(d)]?.spentEntered===true);
    const rozdiel=hasEntry?(narok-spent):null;
    return{d,dayOff,wknd,narok,spent,rozdiel,dn:DNAMES[getDOW(d)],hasEntry};
  });

  const weeks=[];let wk=[];
  for(const row of rows){wk.push(row);if(getDOW(row.d)===0||row.d===dim){weeks.push(wk);wk=[];}}
  if(wk.length>0)weeks.push(wk);

  // Weekly stats — only count hasEntry rows in sums
  const weekStats=[];
  let carry=0;
  for(let wi=0;wi<weeks.length;wi++){
    const wkR=weeks[wi];
    const wN=wkR.reduce((s,r)=>s+(r.hasEntry?r.narok:0),0);
    const wS=wkR.reduce((s,r)=>s+(r.hasEntry?r.spent:0),0);
    const wR=wkR.reduce((s,r)=>s+(r.rozdiel!==null?r.rozdiel:0),0);
    const hasWork=wkR.some(r=>!r.wknd&&!r.dayOff);
    const acc=Math.max(0,carry)+Math.max(0,wR);
    const inv=getWInv(wi);
    const remaining=Math.max(0,acc-inv);
    weekStats.push({wN,wS,wR,acc,inv,remaining,hasWork,hasEntries:wkR.some(r=>r.hasEntry),prevCarry:carry});
    carry=remaining;
  }

  // KPI totals — "Celkový nárok" = full month entitlement (all workdays)
  const totNAll=rows.filter(r=>!r.dayOff&&!r.wknd).reduce((s,r)=>s+r.narok,0);
  // Other totals = only entered days
  const totS=rows.filter(r=>r.hasEntry).reduce((s,r)=>s+r.spent,0);
  const totR=rows.filter(r=>r.rozdiel!==null).reduce((s,r)=>s+r.rozdiel,0);
  const totInv=Array.from({length:weeks.length},(_,i)=>getWInv(i)).reduce((s,v)=>s+v,0);
  // Footer table sums = only entered
  const footN=rows.filter(r=>r.hasEntry).reduce((s,r)=>s+r.narok,0);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
        {[
          {l:"Celkový nárok (mesiac)",v:totNAll,c:"#3b82f6",i:"📋"},
          {l:"Reálne minuté",v:totS,c:"#ef4444",i:"💳"},
          {l:"Úspora obedy",v:totR,c:totR>=0?"#10b981":"#ef4444",i:"✅"},

        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,tableLayout:"fixed"}}>
            <colgroup>

              <col style={{width:"36px"}}/>

                        <td style={{padding:"7px 11px",textAlign:"right"}}>

                        <td className="mono" style={{padding:"7px 11px",textAlign:"right",fontWeight:700,

                  {/* Week summary — show only if there are entries */}
                  {ws.hasWork&&(

                      <td colSpan={3} style={{padding:"5px 11px",fontSize:10,color:"var(--text3)",fontWeight:700,letterSpacing:".5px"}}>

                      </td>
                      <td className="mono" style={{padding:"5px 11px",textAlign:"right",color:ws.wN>0?"#3b82f6":"var(--border)",fontSize:12,fontWeight:700}}>

                      </td>
                      <td className="mono" style={{padding:"5px 11px",textAlign:"right",fontSize:12,fontWeight:700,
                        color:ws.hasEntries?(ws.wR>=0?"#10b981":"#ef4444"):"var(--border)"}}>

                      </td>
                    </tr>
                  )}

                  {/* CAR_pie investment row — always show for weeks with workdays */}
                  {ws.hasWork&&(
                    <tr style={{borderBottom:"2px solid var(--border)"}}>
                      <td colSpan={6} style={{padding:"8px 11px",background:"#080f20"}}>
                        <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",fontSize:12}}>
                          <span style={{color:"#a855f7",fontWeight:700,whiteSpace:"nowrap"}}>📈 CAR_pie</span>
                          <div style={{display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
                            <span style={{color:"var(--text3)"}}>K dispozícii:</span>
                            <span className="mono" style={{color:ws.acc>0?"#f59e0b":"var(--text3)",fontWeight:700}}>{ws.acc.toFixed(2)} €</span>
                            {wi>0&&weekStats[wi-1].remaining>0&&(
                              <span style={{color:"var(--text3)",fontSize:10,fontStyle:"italic"}}>
                                (z toho {weekStats[wi-1].remaining.toFixed(2)} € z min. týžd.)
                              </span>
                            )}
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
                            <span style={{color:"var(--text3)"}}>Investoval som:</span>
                            <InvestCell value={ws.inv} onSave={v=>setWInv(wi,v)}/>
                            <span style={{color:"var(--text3)"}}>€</span>
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
                            <span style={{color:"var(--text3)"}}>Prechádza ďalej →</span>
                            <span className="mono" style={{
                              color:ws.remaining>0?"#10b981":"var(--text3)",
                              fontWeight:700,
                              background:ws.remaining>0?"rgba(16,185,129,0.1)":"transparent",
                              padding:"1px 6px",borderRadius:6
                            }}>{ws.remaining.toFixed(2)} €</span>
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}
                </tbody>
              );
            })}

            <tfoot>
              <tr style={{background:"var(--surface)",borderTop:"2px solid var(--inp-b)"}}>
                <td colSpan={3} style={{padding:"10px 11px",fontWeight:800,fontSize:11,color:"var(--text2)",letterSpacing:".5px"}}>
                  SÚČET ZAPÍSANÝCH ({rows.filter(r=>r.hasEntry).length} dní)
                </td>
                <td className="mono" style={{padding:"10px 11px",textAlign:"right",color:"#3b82f6",fontWeight:800}}>
                  {footN>0?footN.toFixed(2)+" €":"—"}
                </td>
                <td className="mono" style={{padding:"10px 11px",textAlign:"right",color:"var(--text)",fontWeight:800}}>
                  {totS.toFixed(2)} €
                </td>
                <td className="mono" style={{padding:"10px 11px",textAlign:"right",fontWeight:800,color:totR>=0?"#10b981":"#ef4444"}}>
                  {totR>=0?"+":""}{totR.toFixed(2)} €
                </td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

// DayCell — shows placeholder when empty, green tint border when has entry
function DayCell({value,onSave,hasEntry}){
  const [v,setV]=useState(value===0&&!hasEntry?"":String(value===0&&hasEntry?"0.00":value||""));
  const [focused,setFocused]=useState(false);
  const prev=useRef(value);
  const entryRef=useRef(hasEntry);

  useEffect(()=>{
    if(value!==prev.current||hasEntry!==entryRef.current){
      setV(value===0&&!hasEntry?"":value===0&&hasEntry?"0.00":String(value||""));
      prev.current=value;entryRef.current=hasEntry;
    }
  },[value,hasEntry]);

  const handleChange=e=>{const raw=e.target.value.replace(",",".");if(/^(\d*\.?\d{0,2})?$/.test(raw))setV(raw);};
  const handleBlur=()=>{
    setFocused(false);
    // Only save if user typed something (even 0 or 0.00)
    // If field still empty after blur, don't mark as entered
    const n=parseFloat(v);
    if(v.trim()!==""){onSave(isNaN(n)?0:n);}
    else if(hasEntry){onSave(0);}  // was entered before, keep as 0
  };
  const handleFocus=()=>setFocused(true);

  const borderCol=hasEntry?"rgba(16,185,129,0.5)":focused?"var(--inp-b)":"var(--inp-b)";
  const bgCol=hasEntry?"rgba(16,185,129,0.06)":"var(--inp)";

  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>
      <input
        type="text" inputMode="decimal"
        className="inp-sm"
        value={v}
        onChange={handleChange}
        onBlur={handleBlur}
        onFocus={handleFocus}
        placeholder={hasEntry?"":"zadaj..."}
        style={{
          width:72,
          borderColor:borderCol,
          background:bgCol,
          color:hasEntry?"var(--text)":"var(--text3)",
          fontWeight:hasEntry?600:400,
        }}
      />
      <span style={{fontSize:11,color:"var(--text3)"}}>€</span>
    </div>
  );
}

function InvestCell({value,onSave}){
  const [v,setV]=useState(value===0?"":String(value));
  const prev=useRef(value);
  useEffect(()=>{if(value!==prev.current){setV(value===0?"":String(value));prev.current=value;}},[value]);
  const handleChange=e=>{const raw=e.target.value.replace(",",".");if(/^(\d*\.?\d{0,2})?$/.test(raw))setV(raw);};
  const handleBlur=()=>{const n=parseFloat(v)||0;onSave(n);prev.current=n;};
  return(
    <input type="text" inputMode="decimal" value={v} onChange={handleChange} onBlur={handleBlur}
      placeholder="0.00" className="inp-sm"
      style={{width:80,borderColor:parseFloat(v)>0?"#a855f7":"var(--inp-b)",color:parseFloat(v)>0?"#a855f7":"var(--text)",fontWeight:parseFloat(v)>0?700:400}}/>
  );
}

// ── SPORENIE TAB ───────────────────────────────────────────────────────────
function SporTab({goals,saveGoals,contribs,saveContribs,year,txs}){
  const [showModal,setShowModal]=useState(false);
  const [showCalc,setShowCalc]=useState(false);
  const [editGid,setEditGid]=useState(null);
  const [gf,setGf]=useState({name:"",target:"",monthly:"",current:"",rate:"",icon:"💰"});
  // Cashflow calc state
  const [calc,setCalc]=useState({current:0,monthly:200,rate:12,years:10});

  const openAdd=()=>{setGf({name:"",target:"",monthly:"",current:"",rate:"",icon:"💰"});setEditGid(null);setShowModal(true);};
  const openEdit=g=>{setGf({name:g.name,target:String(g.target),monthly:String(g.monthly),current:String(g.current),rate:String(g.rate),icon:g.icon});setEditGid(g.id);setShowModal(true);};
  const handleSave=()=>{if(!gf.name.trim()||!gf.target)return;const g={id:editGid||`g_${Date.now()}`,name:gf.name.trim(),target:parseFloat(gf.target)||0,monthly:parseFloat(gf.monthly)||0,current:parseFloat(gf.current)||0,rate:parseFloat(gf.rate)||0,icon:gf.icon};saveGoals(editGid?goals.map(x=>x.id===editGid?g:x):[...goals,g]);setShowModal(false);};
  const handleDelG=id=>saveGoals(goals.filter(g=>g.id!==id));
  const updateCurrent=(id,val)=>saveGoals(goals.map(g=>g.id===id?{...g,current:parseFloat(val)||0}:g));
  const getMonthIncome=m=>txs.filter(tx=>tx.month===m&&tx.year===year&&isInc(tx)).reduce((s,tx)=>s+tx.amount,0);
  const yrContribs=contribs[String(year)]||{};
  const getContrib=(m,gid)=>parseFloat((yrContribs[String(m)]||{})[gid])||0;
  const setContrib=(m,gid,val)=>{const upd={...contribs,[String(year)]:{...yrContribs,[String(m)]:{...(yrContribs[String(m)]||{}),[gid]:val}}};saveContribs(upd);};
  const goalYearTotal=gid=>Array.from({length:12},(_,i)=>getContrib(i+1,gid)).reduce((s,v)=>s+v,0);
  const getMonthsLeft=g=>{if(g.monthly<=0)return null;const rem=g.target-g.current;if(rem<=0)return 0;if(g.rate===0)return Math.ceil(rem/g.monthly);const r=(g.rate/100)/12;let n=0,acc=g.current;while(acc<g.target&&n<1200){acc=acc*(1+r)+g.monthly;n++;}return n<1200?n:null;};

  // Cashflow calculator
  const calcFV=()=>{
    const r=(calc.rate/100)/12,n=calc.years*12;
    if(calc.rate===0) return calc.current+calc.monthly*n;
    return calc.current*Math.pow(1+r,n)+calc.monthly*(Math.pow(1+r,n)-1)/r;
  };
  const calcChartData=Array.from({length:calc.years+1},(_,i)=>{
    const r=(calc.rate/100)/12,n=i*12;
    const fv=calc.rate===0?calc.current+calc.monthly*n:calc.current*Math.pow(1+r,n)+calc.monthly*(Math.pow(1+r,n)-1)/r;
    const invested=calc.current+calc.monthly*n;
    return{year:`${i}r`,total:Math.round(fv),invested:Math.round(invested),growth:Math.round(fv-invested)};
  });

  const totalTarget=goals.reduce((s,g)=>s+g.target,0);
  const totalCurrent=goals.reduce((s,g)=>s+g.current,0);
  const totalMonthly=goals.reduce((s,g)=>s+g.monthly,0);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
        {[{l:"Celkový cieľ",v:totalTarget,c:"#3b82f6",i:"🎯"},{l:"Nasporené",v:totalCurrent,c:"#10b981",i:"💰"},{l:"Mesačne",v:totalMonthly,c:"#f59e0b",i:"📅"},{l:"Pokrok",v:`${totalTarget>0?((totalCurrent/totalTarget)*100).toFixed(1):0} %`,c:"#a855f7",i:"📊",raw:true}].map(({l,v,c,i,raw})=>(
          <div key={l} className="card" style={{padding:"13px 15px"}}><div style={{fontSize:11,color:"var(--text3)",marginBottom:4}}>{i} {l}</div><div className="mono" style={{fontSize:17,fontWeight:700,color:c}}>{raw?v:fmt(v)}</div></div>
        ))}
      </div>
      <div className="card" style={{padding:"13px 17px"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontWeight:600,fontSize:13}}>Celkový pokrok</span><span className="mono" style={{fontSize:12,color:"var(--text3)"}}>{fmt(totalCurrent)} / {fmt(totalTarget)}</span></div>
        <div className="pbar" style={{height:9}}><div className="pfill" style={{width:`${Math.min(100,totalTarget>0?(totalCurrent/totalTarget)*100:0)}%`,background:"linear-gradient(90deg,#10b981,#3b82f6)"}}/></div>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontWeight:700,fontSize:15}}>Ciele sporenia & investovania</div>
        <div style={{display:"flex",gap:8}}><button className="btn-g" onClick={()=>setShowCalc(!showCalc)}>🧮 Kalkulačka</button><button className="btn" onClick={openAdd}>+ Nový cieľ</button></div>
      </div>

      {/* CASHFLOW CALCULATOR */}
      {showCalc&&(
        <div className="card" style={{padding:"18px 20px"}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>🧮 Kalkulačka zhodnotenia (Compound Interest)</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:16}}>
            {[["Aktuálna suma (€)","current"],["Mesačný príspevok (€)","monthly"],["Ročný výnos (%)","rate"],["Počet rokov","years"]].map(([lbl,fld])=>(
              <div key={fld}>
                <label style={{fontSize:11,color:"var(--text3)",display:"block",marginBottom:5,fontWeight:600}}>{lbl}</label>
                <MoneyInput value={calc[fld]} onSave={v=>setCalc(c=>({...c,[fld]:v}))} className="inp mono" style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid var(--inp-b)",background:"var(--inp)",color:"var(--text)",fontSize:14}}/>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
            {[{l:"Budúca hodnota",v:fmt(calcFV()),c:"#10b981"},{l:"Investované",v:fmt(calc.current+calc.monthly*calc.years*12),c:"#3b82f6"},{l:"Zhodnotenie",v:fmt(calcFV()-(calc.current+calc.monthly*calc.years*12)),c:"#f59e0b"}].map(({l,v,c})=>(
              <div key={l} style={{background:"var(--inp)",borderRadius:8,padding:"11px 13px",border:"1px solid var(--inp-b)"}}>
                <div style={{fontSize:11,color:"var(--text3)",marginBottom:4}}>{l}</div>
                <div className="mono" style={{fontSize:15,fontWeight:800,color:c}}>{v}</div>
              </div>
            ))}
          </div>
          {RC.BarChart&&<ResponsiveContainer width="100%" height={180}>
            <BarChart data={calcChartData} barSize={16}>
              <XAxis dataKey="year" tick={{fill:"var(--text3)",fontSize:10}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:"var(--text3)",fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?`${(v/1000).toFixed(0)}k`:v} width={36}/>
              <Tooltip contentStyle={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,fontSize:12}} formatter={(v,n)=>[fmt(v),n==="invested"?"Investované":"Zhodnotenie"]}/>
              <Bar dataKey="invested" fill="#3b82f6" radius={[0,0,0,0]} stackId="a" name="invested"/>
              <Bar dataKey="growth" fill="#10b981" radius={[4,4,0,0]} stackId="a" name="growth"/>
            </BarChart>
          </ResponsiveContainer>}
        </div>
      )}

      {goals.map((g,i)=>{
        const pct=g.target>0?Math.min(100,(g.current/g.target)*100):0;
        const ml=getMonthsLeft(g),color=GCOLS[i%GCOLS.length],done=g.current>=g.target;
        return(
          <div key={g.id} className="card" style={{padding:"17px 19px",borderLeft:`3px solid ${color}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:11}}>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <span style={{fontSize:20}}>{g.icon}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>{g.name}</div>
                  <div style={{fontSize:11,color:"var(--text3)",marginTop:3,display:"flex",gap:5,flexWrap:"wrap"}}>
                    {g.monthly>0&&<span style={{background:"#0d2538",color:"#3b82f6",padding:"2px 7px",borderRadius:20,fontWeight:600}}>+{g.monthly.toFixed(2)} €/mes</span>}
                    {g.rate>0&&<span style={{background:"#1a1a3a",color:"#a855f7",padding:"2px 7px",borderRadius:20,fontWeight:600}}>{g.rate}% p.a.</span>}
                    {done?<span style={{color:"#10b981",fontWeight:700}}>✅ Splnený!</span>:ml?<span>{ml<12?`${ml} mes.`:`${(ml/12).toFixed(1)} rok.`} do cieľa</span>:<span style={{color:"var(--text3)"}}>bez termínu</span>}
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:3}}><button className="ibtn" onClick={()=>openEdit(g)} style={{fontSize:13}}>✏️</button><button className="ibtn" onClick={()=>handleDelG(g.id)} style={{fontSize:13}}>🗑️</button></div>
            </div>

                <div key={lbl} style={{background:"var(--inp)",borderRadius:8,padding:"8px 10px",border:"1px solid var(--inp-b)"}}>

                </div>
              ))}
            </div>
          </div>
        );
      })}

      {/* MONTHLY CONTRIBUTIONS TABLE */}
      <div className="card" style={{overflow:"hidden"}}>
        <div style={{padding:"12px 15px",borderBottom:"1px solid var(--border)",fontWeight:600,fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>

        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",fontSize:12,width:"100%"}}>
            <thead><tr style={{borderBottom:"1px solid var(--border)"}}>
              <th style={{padding:"8px 10px",textAlign:"left",color:"var(--text3)",fontSize:10,fontWeight:700,letterSpacing:".5px",textTransform:"uppercase",minWidth:80}}>Mesiac</th>
              <th style={{padding:"8px 10px",textAlign:"right",color:"var(--text3)",fontSize:10,fontWeight:700,letterSpacing:".5px",minWidth:70}}>Príjem</th>
              {goals.map((g,i)=><th key={g.id} style={{padding:"8px 10px",textAlign:"right",color:GCOLS[i%GCOLS.length],fontSize:10,fontWeight:700,minWidth:90}}>{g.icon} {g.name.split(" ")[0]}</th>)}
              <th style={{padding:"8px 10px",textAlign:"right",color:"var(--text3)",fontSize:10,fontWeight:700,minWidth:80}}>Spolu</th>
              <th style={{padding:"8px 10px",textAlign:"right",color:"var(--text3)",fontSize:10,fontWeight:700,minWidth:70}}>% príjmu</th>
            </tr></thead>
            <tbody>
              {MONTHS.map((mName,mi)=>{
                const m=mi+1,inc=getMonthIncome(m),mC=goals.map(g=>getContrib(m,g.id)),mTot=mC.reduce((s,v)=>s+v,0),pct=inc>0?((mTot/inc)*100).toFixed(1):"—";
                return(
                  <tr key={m} style={{background:mi%2===0?"var(--alt)":"transparent",borderBottom:"1px solid var(--border)"}}>
                    <td style={{padding:"6px 10px",color:"var(--text2)",fontWeight:500}}>{mName}</td>
                    <td className="mono" style={{padding:"6px 10px",textAlign:"right",color:inc>0?"#10b981":"var(--border)",fontSize:12}}>{inc>0?fmt(inc):"—"}</td>
                    {goals.map((g,i)=>(
                      <td key={g.id} style={{padding:"4px 7px"}}>
                        <ContribCell value={getContrib(m,g.id)} onSave={v=>setContrib(m,g.id,v)} color={GCOLS[i%GCOLS.length]}/>
                      </td>
                    ))}
                    <td className="mono" style={{padding:"6px 10px",textAlign:"right",color:mTot>0?"#10b981":"var(--border)",fontWeight:700}}>{mTot>0?mTot.toFixed(2)+" €":"—"}</td>
                    <td className="mono" style={{padding:"6px 10px",textAlign:"right",color:"#f59e0b"}}>{pct!=="—"?pct+" %":"—"}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot><tr style={{background:"var(--surface)",borderTop:"2px solid var(--border)"}}>
              <td style={{padding:"9px 10px",fontWeight:700,color:"var(--text3)",fontSize:11}}>SPOLU</td>
              <td className="mono" style={{padding:"9px 10px",textAlign:"right",color:"#10b981",fontWeight:700}}>{fmt(Array.from({length:12},(_,i)=>getMonthIncome(i+1)).reduce((s,v)=>s+v,0))}</td>
              {goals.map((g,i)=><td key={g.id} className="mono" style={{padding:"9px 10px",textAlign:"right",color:GCOLS[i%GCOLS.length],fontWeight:700}}>{goalYearTotal(g.id)>0?goalYearTotal(g.id).toFixed(2)+" €":"—"}</td>)}
              <td className="mono" style={{padding:"9px 10px",textAlign:"right",color:"#10b981",fontWeight:700}}>{Array.from({length:12},(_,i)=>goals.reduce((s,g)=>s+getContrib(i+1,g.id),0)).reduce((s,v)=>s+v,0).toFixed(2)+" €"}</td>
              <td/>
            </tr></tfoot>
          </table>
        </div>
      </div>

      {showModal&&(
        <div className="ov" onClick={e=>{if(e.target===e.currentTarget)setShowModal(false);}}>
          <div className="modal">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div style={{fontWeight:800,fontSize:17}}>{editGid?"✏️ Upraviť cieľ":"💰 Nový cieľ"}</div><button className="ibtn" onClick={()=>setShowModal(false)} style={{fontSize:20}}>×</button></div>
            <div style={{marginBottom:12}}><label style={{fontSize:11,color:"var(--text3)",display:"block",marginBottom:7,fontWeight:600,letterSpacing:".5px"}}>IKONA</label><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{GICONS.map(ic=><button key={ic} onClick={()=>setGf(f=>({...f,icon:ic}))} style={{width:34,height:34,borderRadius:7,border:"2px solid",cursor:"pointer",fontSize:16,background:gf.icon===ic?"var(--inp-b)":"var(--inp)",borderColor:gf.icon===ic?"#10b981":"var(--inp-b)"}}>{ic}</button>)}</div></div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {[["NÁZOV CIEĽA","name","text","Napr. Dovolenka..."],["CIEĽOVÁ SUMA (€)","target","money","10 000"],["MESAČNÝ PRÍSPEVOK (€)","monthly","money","200"],["AKTUÁLNE NASPORENÉ (€)","current","money","0"],["ROČNÝ VÝNOS % (ETF ≈ 12)","rate","money","12"]].map(([lbl,fld,tp,ph])=>(
                <div key={fld}><label style={{fontSize:11,color:"var(--text3)",display:"block",marginBottom:4,fontWeight:600,letterSpacing:".5px"}}>{lbl}</label>{tp==="money"?<MoneyInput value={parseFloat(gf[fld])||0} onSave={v=>setGf(f=>({...f,[fld]:String(v)}))} className="inp mono" style={{width:"100%",padding:"9px 13px",borderRadius:8,border:"1px solid var(--inp-b)",fontSize:14,background:"var(--inp)",color:"var(--text)"}} placeholder={ph}/>:<input type="text" className="inp" placeholder={ph} value={gf[fld]} onChange={e=>setGf(f=>({...f,[fld]:e.target.value}))}/>}</div>
              ))}
            </div>
            <div style={{display:"flex",gap:9,marginTop:18}}><button className="btn-g" style={{flex:1}} onClick={()=>setShowModal(false)}>Zrušiť</button><button className="btn" style={{flex:2}} onClick={handleSave}>{editGid?"Uložiť zmeny":"Vytvoriť cieľ"}</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

function ContribCell({value,onSave,color}){
  const [v,setV]=useState(value===0?"":String(value));
  const prev=useRef(value);
  useEffect(()=>{if(value!==prev.current){setV(value===0?"":String(value));prev.current=value;}},[value]);
  const handleChange=e=>{const raw=e.target.value.replace(",",".");if(/^(\d*\.?\d{0,2})?$/.test(raw))setV(raw);};
  const handleBlur=()=>{const n=parseFloat(v)||0;onSave(n);prev.current=n;};
  return <input type="text" inputMode="decimal" value={v} onChange={handleChange} onBlur={handleBlur} placeholder="0.00" className="inp-sm" style={{width:"85px",color:v&&parseFloat(v)>0?color:"var(--text3)",borderColor:v&&parseFloat(v)>0?color+"66":"var(--inp-b)"}}/>;
}

// ── TRENDS TAB ─────────────────────────────────────────────────────────────
function TrendsTab({txs,year,month,allExpCats}){
  const [selCat,setSelCat]=useState("Potraviny nákup");
  const [showAll,setShowAll]=useState(false);

  // MoM data for selected category
  const catData=MONTHS.map((_,i)=>{
    const m=i+1;
    const t=txs.filter(tx=>tx.month===m&&tx.year===year&&isExp(tx)&&(tx.cat||tx.category)===selCat);
    const val=t.reduce((s,tx)=>s+tx.amount,0);
    return{name:MONTHS[i].slice(0,3),value:+val.toFixed(2),month:m};
  });

  // Category comparison for selected month
  const monthCatData=allExpCats.map(cat=>{
    const cur=txs.filter(tx=>tx.month===month&&tx.year===year&&isExp(tx)&&(tx.cat||tx.category)===cat).reduce((s,tx)=>s+tx.amount,0);
    const prevM=month===1?12:month-1,prevY=month===1?year-1:year;
    const prev=txs.filter(tx=>tx.month===prevM&&tx.year===prevY&&isExp(tx)&&(tx.cat||tx.category)===cat).reduce((s,tx)=>s+tx.amount,0);
    const diff=prev>0?((cur-prev)/prev*100).toFixed(0):null;
    return{cat,cur:+cur.toFixed(2),prev:+prev.toFixed(2),diff};
  }).filter(d=>d.cur>0||d.prev>0).sort((a,b)=>b.cur-a.cur);

  const displayedCats=showAll?monthCatData:monthCatData.slice(0,10);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* Category over 12 months */}
      <div className="card" style={{padding:"16px 18px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <div style={{fontWeight:700,fontSize:14}}>📊 Kategória cez rok {year}</div>
          <select className="inp" style={{width:"auto",padding:"6px 10px",fontSize:13}} value={selCat} onChange={e=>setSelCat(e.target.value)}>
            {allExpCats.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        {RC.BarChart?<ResponsiveContainer width="100%" height={200}>
          <BarChart data={catData} barSize={22}>
            <XAxis dataKey="name" tick={{fill:"var(--text3)",fontSize:11}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:"var(--text3)",fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?`${(v/1000).toFixed(1)}k`:v} width={36}/>
            <Tooltip contentStyle={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,fontSize:12}} formatter={v=>[fmt(v),selCat]} cursor={{fill:"rgba(255,255,255,0.04)"}}/>
            <Bar dataKey="value" radius={[5,5,0,0]} fill="#10b981">
              {catData.map((entry,i)=><Cell key={i} fill={entry.month===month?"#f59e0b":"#10b981"}/>)}
            </Bar>
          </BarChart>
        </ResponsiveContainer>:<div style={{color:"var(--text3)",textAlign:"center",padding:40,fontSize:13}}>Graf nedostupný</div>}
        <div style={{fontSize:11,color:"var(--text3)",textAlign:"center",marginTop:4}}>🟡 = aktuálny mesiac</div>
      </div>

      {/* MoM comparison */}
      <div className="card" style={{overflow:"hidden"}}>
        <div style={{padding:"12px 15px",borderBottom:"1px solid var(--border)",fontWeight:600,fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span>⚖️ Porovnanie: {MONTHS[month-1]} vs {month===1?MONTHS[11]:MONTHS[month-2]} {year}</span>
          <button className="btn-sm" onClick={()=>setShowAll(s=>!s)}>{showAll?"Menej":"Všetky"}</button>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr style={{borderBottom:"1px solid var(--border)"}}>
              {["Kategória","Tento mesiac","Minulý mesiac","Zmena","Trend"].map((h,i)=>(
                <th key={h} style={{padding:"9px 12px",textAlign:i===0?"left":"right",color:"var(--text3)",fontSize:10,fontWeight:700,letterSpacing:".5px",textTransform:"uppercase"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {displayedCats.map((row,i)=>{
                const diff=parseFloat(row.diff);
                const trendColor=diff>0?"#ef4444":diff<0?"#10b981":"var(--text3)";
                const trendIcon=diff>10?"🔺":diff>0?"↑":diff<-10?"🔻":diff<0?"↓":"→";
                return(
                  <tr key={row.cat} style={{borderBottom:"1px solid var(--border)",background:i%2===0?"var(--alt)":"transparent"}}>
                    <td style={{padding:"8px 12px",color:"var(--text2)",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.cat}</td>
                    <td className="mono" style={{padding:"8px 12px",textAlign:"right",color:"var(--text)",fontWeight:600}}>{row.cur>0?fmt(row.cur):"—"}</td>
                    <td className="mono" style={{padding:"8px 12px",textAlign:"right",color:"var(--text3)"}}>{row.prev>0?fmt(row.prev):"—"}</td>
                    <td className="mono" style={{padding:"8px 12px",textAlign:"right",color:trendColor,fontWeight:700}}>{row.diff!==null?(diff>=0?"+":"")+diff+" %":"—"}</td>
                    <td style={{padding:"8px 12px",textAlign:"right",fontSize:16}}>{row.diff!==null?trendIcon:"—"}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── ACCOUNTS TAB ───────────────────────────────────────────────────────────
function AccountsTab({accounts,saveAccounts,txs,month,year}){
  const [showModal,setShowModal]=useState(false);
  const [editId,setEditId]=useState(null);
  const [af,setAf]=useState({name:"",color:"#10b981",icon:"🏦"});
  const ICONS=["🏦","💎","💵","💳","🏠","📈","🔐","💰","🎯"];
  const COLORS=["#10b981","#3b82f6","#f59e0b","#a855f7","#ef4444","#06b6d4","#f97316","#ec4899"];

  const openAdd=()=>{setAf({name:"",color:"#10b981",icon:"🏦"});setEditId(null);setShowModal(true);};
  const openEdit=a=>{setAf({name:a.name,color:a.color,icon:a.icon});setEditId(a.id);setShowModal(true);};
  const handleSave=()=>{if(!af.name.trim())return;const a={id:editId||`acc_${Date.now()}`,name:af.name.trim(),color:af.color,icon:af.icon};saveAccounts(editId?accounts.map(x=>x.id===editId?a:x):[...accounts,a]);setShowModal(false);};
  const handleDel=id=>{if(accounts.length<=1)return alert("Musíš mať aspoň jeden účet.");saveAccounts(accounts.filter(a=>a.id!==id));};

  const getAccBalance=(aid)=>{
    const inc=txs.filter(tx=>tx.accountId===aid&&isInc(tx)).reduce((s,tx)=>s+tx.amount,0);
    const exp=txs.filter(tx=>tx.accountId===aid&&isExp(tx)).reduce((s,tx)=>s+tx.amount,0);
    return inc-exp;
  };
  const getAccMonthly=(aid)=>{
    const mt=txs.filter(tx=>tx.accountId===aid&&tx.month===month&&tx.year===year);
    return{inc:mt.filter(isInc).reduce((s,tx)=>s+tx.amount,0),exp:mt.filter(isExp).reduce((s,tx)=>s+tx.amount,0)};
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontWeight:700,fontSize:15}}>Účty & Portfóliá</div><div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>Každá transakcia patrí k účtu</div></div>
        <button className="btn" onClick={openAdd}>+ Nový účet</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
        {accounts.map(acc=>{
          const bal=getAccBalance(acc.id);
          const {inc,exp}=getAccMonthly(acc.id);
          const txCount=txs.filter(tx=>tx.accountId===acc.id).length;
          return(
            <div key={acc.id} className="card" style={{padding:"18px 20px",borderTop:`3px solid ${acc.color}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <div style={{width:40,height:40,borderRadius:10,background:acc.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{acc.icon}</div>
                  <div><div style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>{acc.name}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{txCount} transakcií celkovo</div></div>
                </div>
                <div style={{display:"flex",gap:3}}><button className="ibtn" onClick={()=>openEdit(acc)} style={{fontSize:13}}>✏️</button><button className="ibtn" onClick={()=>handleDel(acc.id)} style={{fontSize:13}}>🗑️</button></div>
              </div>
              <div className="mono" style={{fontSize:22,fontWeight:800,color:bal>=0?acc.color:"#ef4444",marginBottom:10}}>{bal>=0?"+":""}{bal.toLocaleString("sk-SK",{minimumFractionDigits:2,maximumFractionDigits:2})} €</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div style={{background:"var(--inp)",borderRadius:8,padding:"8px 10px",border:"1px solid var(--inp-b)"}}>
                  <div style={{fontSize:10,color:"var(--text3)",marginBottom:3}}>Príjmy tento mesiac</div>
                  <div className="mono" style={{fontSize:13,fontWeight:700,color:"#10b981"}}>{fmt(inc)}</div>
                </div>
                <div style={{background:"var(--inp)",borderRadius:8,padding:"8px 10px",border:"1px solid var(--inp-b)"}}>
                  <div style={{fontSize:10,color:"var(--text3)",marginBottom:3}}>Výdavky tento mesiac</div>
                  <div className="mono" style={{fontSize:13,fontWeight:700,color:"#ef4444"}}>{fmt(exp)}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {showModal&&(
        <div className="ov" onClick={e=>{if(e.target===e.currentTarget)setShowModal(false);}}>
          <div className="modal" style={{maxWidth:420}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div style={{fontWeight:800,fontSize:17}}>{editId?"✏️ Upraviť účet":"🏦 Nový účet"}</div><button className="ibtn" onClick={()=>setShowModal(false)} style={{fontSize:20}}>×</button></div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:"var(--text3)",display:"block",marginBottom:7,fontWeight:600}}>IKONA</label>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{ICONS.map(ic=><button key={ic} onClick={()=>setAf(f=>({...f,icon:ic}))} style={{width:36,height:36,borderRadius:8,border:"2px solid",cursor:"pointer",fontSize:18,background:af.icon===ic?"var(--inp-b)":"var(--inp)",borderColor:af.icon===ic?"#10b981":"var(--inp-b)"}}>{ic}</button>)}</div>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:"var(--text3)",display:"block",marginBottom:7,fontWeight:600}}>FARBA</label>
              <div style={{display:"flex",gap:6}}>{COLORS.map(c=><button key={c} onClick={()=>setAf(f=>({...f,color:c}))} style={{width:28,height:28,borderRadius:50,background:c,border:`2px solid ${af.color===c?"white":"transparent"}`,cursor:"pointer",outline:af.color===c?`2px solid ${c}`:undefined,outlineOffset:2}}/> )}</div>
            </div>
            <div style={{marginBottom:14}}><label style={{fontSize:11,color:"var(--text3)",display:"block",marginBottom:6,fontWeight:600}}>NÁZOV ÚČTU</label><input type="text" className="inp" placeholder="Napr. ČSOB bežný..." value={af.name} onChange={e=>setAf(f=>({...f,name:e.target.value}))}/></div>
            <div style={{display:"flex",gap:9}}><button className="btn-g" style={{flex:1}} onClick={()=>setShowModal(false)}>Zrušiť</button><button className="btn" style={{flex:2}} onClick={handleSave}>{editId?"Uložiť":"Vytvoriť účet"}</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── YEARLY TAB ─────────────────────────────────────────────────────────────
function YearTab({yrData,year,month,setMonth}){

    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div className="card" style={{padding:"17px 17px 11px"}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:16}}>Ročný prehľad {year}</div>
        {RC.BarChart?<ResponsiveContainer width="100%" height={210}>
          <BarChart data={yrData} barSize={12} barGap={3}>
            <XAxis dataKey="name" tick={{fill:"var(--text3)",fontSize:11}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:"var(--text3)",fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>v>=1000?`${(v/1000).toFixed(1)}k`:v} width={36}/>
            <Tooltip contentStyle={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:9,fontSize:12}} formatter={(v,n)=>[fmt(v),n==="income"?"Príjem":n==="expenses"?"Výdavky":"Úspora"]} cursor={{fill:"rgba(255,255,255,0.03)"}}/>
            <Bar dataKey="income" fill="#10b981" radius={[4,4,0,0]} name="income"/>
            <Bar dataKey="expenses" fill="#ef4444" radius={[4,4,0,0]} name="expenses"/>
            <Bar dataKey="savings" fill="#f59e0b" radius={[4,4,0,0]} name="savings"/>
          </BarChart>
        </ResponsiveContainer>:<div style={{color:"var(--text3)",textAlign:"center",padding:40}}>Graf nedostupný</div>}
        <div style={{display:"flex",gap:18,justifyContent:"center",marginTop:7}}>
          {[["#10b981","Príjem"],["#ef4444","Výdavky"],["#f59e0b","Úspora"]].map(([c,l])=><div key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"var(--text3)"}}><div style={{width:9,height:9,background:c,borderRadius:2}}/>{l}</div>)}
        </div>
      </div>
      <div className="card" style={{overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{borderBottom:"1px solid var(--border)"}}>{["Mesiac","Príjem","Výdavky","Úspora","% úspory"].map((h,i)=><th key={h} style={{padding:"10px 13px",textAlign:i===0?"left":"right",color:"var(--text3)",fontWeight:600,fontSize:11,letterSpacing:".5px",textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
            <tbody>
              {yrData.map((row,i)=>{const pct=row.income>0?((row.savings/row.income)*100).toFixed(0):null,hd=row.income>0||row.expenses>0,isSel=month===i+1;return(
                <tr key={i} onClick={()=>setMonth(i+1)} style={{borderBottom:"1px solid var(--border)",cursor:"pointer",background:isSel?"var(--hover)":"transparent"}} className="txrow">
                  <td style={{padding:"10px 13px",fontWeight:isSel?700:400,color:isSel?"#10b981":"var(--text)"}}>{isSel&&"▶ "}{MONTHS[i]}</td>
                  <td className="mono" style={{padding:"10px 13px",textAlign:"right",color:"#10b981"}}>{hd?fmt(row.income):<span style={{color:"var(--border)"}}>—</span>}</td>
                  <td className="mono" style={{padding:"10px 13px",textAlign:"right",color:"#ef4444"}}>{hd?fmt(row.expenses):<span style={{color:"var(--border)"}}>—</span>}</td>
                  <td className="mono" style={{padding:"10px 13px",textAlign:"right",color:row.savings>=0?"#10b981":"#ef4444"}}>{hd?fmt(row.savings):<span style={{color:"var(--border)"}}>—</span>}</td>
                  <td className="mono" style={{padding:"10px 13px",textAlign:"right",color:"#f59e0b"}}>{pct!==null&&hd?`${pct} %`:<span style={{color:"var(--border)"}}>—</span>}</td>
                </tr>
              );})}
            </tbody>
            <tfoot><tr style={{borderTop:"2px solid var(--border)",background:"var(--surface)"}}>
              <td style={{padding:"10px 13px",fontWeight:700,color:"var(--text3)",fontSize:11}}>SPOLU</td>
              {["income","expenses","savings"].map(k=>{const tot=yrData.reduce((s,r)=>s+r[k],0),c=k==="income"?"#10b981":k==="expenses"?"#ef4444":tot>=0?"#10b981":"#ef4444";return <td key={k} className="mono" style={{padding:"10px 13px",textAlign:"right",color:c,fontWeight:700}}>{fmt(tot)}</td>;})}
              <td style={{padding:"10px 13px"}}/>
            </tr></tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
